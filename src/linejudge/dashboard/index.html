<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>linejudge</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --text: #1a1e24; --muted: #6b7280;
    --line: #e2e5ea; --ok: #15803d; --bad: #b91c1c; --accent: #2563eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101418; --panel: #181d23; --text: #e5e9ee; --muted: #8b94a1;
      --line: #2a323c; --ok: #4ade80; --bad: #f87171; --accent: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex; gap: 16px; align-items: baseline; }
  header h1 { font-size: 17px; margin: 0; }
  header .tag { color: var(--muted); font-size: 12px; }
  #ledger { margin-left: auto; color: var(--muted); font-size: 13px; }
  main { display: grid; grid-template-columns: 340px 1fr; gap: 0; height: calc(100vh - 49px); }
  #runs { border-right: 1px solid var(--line); overflow-y: auto; }
  .run { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .run:hover, .run.sel { background: var(--panel); }
  .run .id { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; }
  .run .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .pill { display: inline-block; padding: 0 7px; border-radius: 9px; font-size: 11px; font-weight: 600; }
  .pill.ok { color: var(--ok); border: 1px solid var(--ok); }
  .pill.bad { color: var(--bad); border: 1px solid var(--bad); }
  .pill.dim { color: var(--muted); border: 1px solid var(--muted); }
  #detail { overflow-y: auto; padding: 18px 22px; }
  #detail h2 { font-size: 15px; font-family: ui-monospace, monospace; margin: 0 0 10px; word-break: break-all; }
  details { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 10px; }
  details summary { padding: 8px 12px; cursor: pointer; font-weight: 600; font-size: 13px; }
  details pre { margin: 0; padding: 12px; overflow-x: auto; font-size: 12px;
                border-top: 1px solid var(--line); white-space: pre-wrap; word-break: break-word; }
  .verifier { padding: 6px 12px; border-top: 1px solid var(--line); font-size: 13px; }
  .verifier code { color: var(--muted); }
  #decide { margin: 14px 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #decide input { flex: 1; min-width: 180px; padding: 7px 10px; border: 1px solid var(--line);
                  border-radius: 6px; background: var(--panel); color: var(--text); }
  button { padding: 7px 14px; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; color: #fff; }
  .approve { background: var(--ok); } .reject { background: var(--bad); }
  .decided { font-size: 13px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>linejudge</h1>
  <span class="tag">the independent line judge for coding agents</span>
  <span id="ledger"></span>
</header>
<main>
  <div id="runs"></div>
  <div id="detail"><div class="empty">Select a run.</div></div>
</main>
<script>
"use strict";
const $ = (sel, el) => (el || document).querySelector(sel);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let selected = null;

function pill(text, cls) { return `<span class="pill ${cls}">${esc(text)}</span>`; }

async function loadRuns() {
  const data = await (await fetch("/api/runs")).json();
  const led = data.ledger;
  $("#ledger").textContent =
    `${led.runs} runs · $${(led.total_cost_usd || 0).toFixed(4)} · ` +
    Object.entries(led.by_status).map(([k, v]) => `${v} ${k}`).join(" · ");
  const list = $("#runs");
  if (!data.runs.length) { list.innerHTML = '<div class="empty">No runs yet.</div>'; return; }
  list.innerHTML = data.runs.map(r => `
    <div class="run${r.run_id === selected ? " sel" : ""}" data-id="${esc(r.run_id)}">
      <div class="id">${esc(r.run_id)}</div>
      <div class="meta">
        ${pill(r.status || "?", r.status === "SUCCESS" ? "ok" : "bad")}
        ${r.verifier_count ? pill(`verifiers ${r.verdict_passed ? "PASS" : "FAIL"}`, r.verdict_passed ? "ok" : "bad") : ""}
        ${r.has_diff ? pill("diff", "dim") : ""}
        ${r.decision ? pill(r.decision, r.decision === "approve" ? "ok" : "bad") : ""}
        ${r.total_cost_usd != null ? "$" + r.total_cost_usd.toFixed(4) : ""}
      </div>
    </div>`).join("");
  list.querySelectorAll(".run").forEach(el =>
    el.addEventListener("click", () => loadDetail(el.dataset.id)));
}

function section(title, body, open) {
  if (body == null) return "";
  const text = typeof body === "string" ? body : JSON.stringify(body, null, 2);
  return `<details${open ? " open" : ""}><summary>${esc(title)}</summary><pre>${esc(text)}</pre></details>`;
}

function verdictSection(v) {
  if (!v) return "";
  const rows = (v.verifiers || []).map(e => `
    <div class="verifier">${e.passed ? "✅" : "❌"} <b>${esc(e.kind)}</b>
      <code>${esc(e.spec)}</code>
      <pre>${esc(e.evidence || "")}</pre></div>`).join("");
  return `<details open><summary>Verdict — ${v.passed ? "PASS" : "FAIL"}</summary>${rows}</details>`;
}

async function loadDetail(id) {
  selected = id;
  const d = await (await fetch("/api/runs/" + encodeURIComponent(id))).json();
  const decided = d.decision
    ? `<span class="decided">Decision: ${pill(d.decision.decision, d.decision.decision === "approve" ? "ok" : "bad")}
       ${esc(d.decision.note || "")} <i>(${esc(d.decision.decided_at || "")})</i></span>`
    : `<input id="note" placeholder="optional note">
       <button class="approve">Approve</button><button class="reject">Reject</button>`;
  $("#detail").innerHTML = `
    <h2>${esc(d.run_id)}</h2>
    <div id="decide">${decided}</div>
    ${section("Summary", d.summary, true)}
    ${verdictSection(d.verdict)}
    ${section("Agent report (claim)", d.report)}
    ${section("Write diff", d.diff)}
    ${section("Outcome", d.outcome)}
    ${section("Cost", d.cost)}
    ${section("Learning", d.learning)}
    ${section("Prompt", d.prompt)}`;
  const send = decision => async () => {
    await fetch(`/api/runs/${encodeURIComponent(id)}/decision`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({decision, note: $("#note").value}),
    });
    await loadRuns(); await loadDetail(id);
  };
  const a = $(".approve"), r = $(".reject");
  if (a) a.addEventListener("click", send("approve"));
  if (r) r.addEventListener("click", send("reject"));
  loadRuns();
}

loadRuns();
</script>
</body>
</html>
